<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <!-- Purple accent gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <!-- Gold gradient for JP -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- ── Outer ring decorative ── -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.25"/>

  <!-- ── Hexagon background shape ── -->
  <polygon points="256,56 416,151 416,341 256,436 96,341 96,151"
           fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.3"/>

  <!-- ── Inner glowing circle ── -->
  <circle cx="256" cy="220" r="118" fill="#0f172a" opacity="0.9"/>
  <circle cx="256" cy="220" r="118" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5"/>

  <!-- ── Circuit lines decoration ── -->
  <!-- Top line -->
  <line x1="256" y1="38" x2="256" y2="100" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="100" r="3" fill="#7c3aed" opacity="0.7"/>
  <!-- Bottom line -->
  <line x1="256" y1="340" x2="256" y2="420" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="340" r="3" fill="#06b6d4" opacity="0.6"/>
  <!-- Left lines -->
  <line x1="96" y1="151" x2="140" y2="175" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="96" y1="341" x2="140" y2="317" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <!-- Right lines -->
  <line x1="416" y1="151" x2="372" y2="175" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>
  <line x1="416" y1="341" x2="372" y2="317" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>

  <!-- ── Small dots decoration ── -->
  <circle cx="180" cy="130" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="332" cy="130" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="150" cy="260" r="2.5" fill="#7c3aed" opacity="0.5"/>
  <circle cx="362" cy="260" r="2.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="180" cy="390" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="332" cy="390" r="3" fill="#06b6d4" opacity="0.5"/>

  <!-- ── JP lettering (main) ── -->
  <text x="256" y="252"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900"
        font-size="118"
        text-anchor="middle"
        fill="url(#goldGrad)"
        filter="url(#shadow)"
        letter-spacing="-4">JP</text>

  <!-- ── X accent ── -->
  <text x="256" y="252"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900"
        font-size="118"
        text-anchor="middle"
        fill="none"
        stroke="url(#goldGrad)"
        stroke-width="1"
        opacity="0.15"
        letter-spacing="-4">JP</text>

  <!-- ── Cyan underline bar ── -->
  <rect x="156" y="264" width="200" height="4" rx="2" fill="url(#cyanGrad)" filter="url(#softGlow)" opacity="0.9"/>

  <!-- ── STOREX label ── -->
  <text x="256" y="312"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-weight="700"
        font-size="28"
        text-anchor="middle"
        fill="#e2e8f0"
        letter-spacing="8">STOREX</text>

  <!-- ── BOT label ── -->
  <text x="256" y="340"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-weight="400"
        font-size="14"
        text-anchor="middle"
        fill="#06b6d4"
        letter-spacing="10"
        opacity="0.85">BOT</text>

  <!-- ── Bottom tagline ── -->
  <text x="256" y="418"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-weight="400"
        font-size="13"
        text-anchor="middle"
        fill="#94a3b8"
        letter-spacing="3"
        opacity="0.7">AI SERVICES STORE</text>

  <!-- ── Small star accents ── -->
  <text x="130" y="420" font-size="10" fill="#fbbf24" opacity="0.6">✦</text>
  <text x="370" y="420" font-size="10" fill="#fbbf24" opacity="0.6">✦</text>

  <!-- ── Corner glow dots ── -->
  <circle cx="256" cy="256" r="5" fill="#7c3aed" opacity="0.0"/>
  <!-- Top purple glow -->
  <radialGradient id="topGlow" cx="50%" cy="0%" r="50%">
    <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="256" fill="url(#topGlow)"/>
</svg>
